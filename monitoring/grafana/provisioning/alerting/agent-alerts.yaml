# Grafana alert rules for TripCalculate agent observability.
# Provisioned via filesystem; Grafana applies on startup or reload.
#
# M5: rules updated.
#  - Rule 1: div-by-zero guard added — fires only when total session count > 0.
#  - Rule 2: static $0.10 threshold replaced with dynamic median × 3 from the
#    agent_session_cost_usd histogram (emitted by app.py on stream completion).
#
# TODO (M6): Wire a Grafana contact point (Slack webhook or email) and assign
# it to the "agent-ops" notification policy below. Pending human's preferred
# channel choice (CLAUDE.md M5 row: "ask if undefined").

apiVersion: 1

# --- Notification policy scaffold (no contact point wired until M5) ---
# policies:
#   - orgId: 1
#     receiver: agent-ops          # TODO M5: create this contact point in Grafana UI
#     matchers:
#       - alertname =~ "agent-.*"
#     group_wait: 30s
#     group_interval: 5m
#     repeat_interval: 1h

groups:
  - orgId: 1
    name: agent-ops
    folder: Agent
    interval: 1m
    rules:

      # -----------------------------------------------------------------------
      # Rule 1: Agent failure rate > 20% over 5 min
      # Fires when more than 1 in 5 agent sessions ends in error.
      # Root cause candidates: LLM provider outage, tool returning raw exception,
      # ModelCallLimitMiddleware not active (check agent_steps_per_session p95).
      # -----------------------------------------------------------------------
      - uid: agent-failure-rate
        title: "Agent failure rate > 20% (5m)"
        condition: C
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                sum(rate(agent_sessions_total{status="error"}[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                sum(rate(agent_sessions_total[5m]))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: __expr__
            model:
              type: math
              # M5: div-by-zero guard. Without "$B > 0", zero-traffic windows
              # would compute 0/0 = +Inf and trip the alert immediately.
              expression: "$B > 0 && $A / $B > 0.2"
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Agent error rate is {{ $values.C | humanizePercentage }} over the last 5 minutes"
          description: >
            More than 20% of agent sessions are ending in error.
            Check langgraph-agent logs: docker logs langgraph-agent --tail 100
            Check Langfuse for repeated error traces in the last 5 minutes.
        labels:
          severity: warning
          team: agent-ops

      # -----------------------------------------------------------------------
      # Rule 2 (M5): Cost per session > 3 × historical median.
      #
      # Compares the recent (1h) average cost-per-session to the long-window
      # (1d) median computed from agent_session_cost_usd. A 3× spike above
      # the median typically means a runaway loop or a much harder query
      # mix — both warrant operator attention.
      #
      # Guarded against zero traffic via $B > 0; histogram_quantile returns
      # NaN on empty buckets which Prometheus expression treats as no-data.
      # -----------------------------------------------------------------------
      - uid: agent-cost-per-session
        title: "Agent cost-per-session > 3× historical median (1h)"
        condition: D
        data:
          - refId: A
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                increase(agent_llm_cost_usd_total[1h])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: B
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                increase(agent_sessions_total{status="ok"}[1h])
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: C
            relativeTimeRange: { from: 86400, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                histogram_quantile(0.5, sum by (le) (rate(agent_session_cost_usd_bucket[1d])))
              intervalMs: 1000
              maxDataPoints: 43200
          - refId: D
            relativeTimeRange: { from: 3600, to: 0 }
            datasourceUid: __expr__
            model:
              type: math
              # Fire if recent_cost_per_session > 3 × historical_median.
              # Guard against zero traffic ($B > 0) and against missing histogram
              # data ($C > 0) — both yield NoData rather than firing.
              expression: "$B > 0 && $C > 0 && ($A / $B) > 3 * $C"
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Cost per session is more than 3× the historical median"
          description: >
            Average cost-per-session over the last hour is more than 3× the
            historical median (1d window). Check agent_steps_per_session p95 —
            a runaway model loop is the most common cause. Verify
            ModelCallLimitMiddleware(15) is active.
        labels:
          severity: warning
          team: agent-ops

      # -----------------------------------------------------------------------
      # Rule 3: Tool success rate < 80% on any single tool (5m)
      # Fires if any individual tool's success rate drops below 80%.
      # Root cause candidates: external API rate limit, bad structured-output
      # schema, tool returning raw exception instead of {"status": ..., "hint": ...}.
      # -----------------------------------------------------------------------
      - uid: agent-tool-success-rate
        title: "Tool success rate < 80% on any tool (5m)"
        condition: A
        data:
          - refId: A
            relativeTimeRange: { from: 300, to: 0 }
            datasourceUid: prometheus-local
            model:
              expr: >
                sum by (tool_name) (rate(agent_tool_calls_total{status="ok"}[5m]))
                /
                sum by (tool_name) (rate(agent_tool_calls_total[5m]))
                < 0.8
              intervalMs: 1000
              maxDataPoints: 43200
        noDataState: NoData
        execErrState: Error
        for: 5m
        annotations:
          summary: "Tool {{ $labels.tool_name }} success rate is below 80% over 5 minutes"
          description: >
            Tool {{ $labels.tool_name }} is failing more than 20% of calls.
            Check that the tool returns {"status": "no_results", "hint": "..."}
            on failures — never raw exceptions (CLAUDE.md §Non-negotiable #9).
            Check ToolNode(handle_tool_errors=True) is set explicitly.
        labels:
          severity: warning
          team: agent-ops
