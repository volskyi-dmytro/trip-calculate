name: Deploy to Production (VPS)

on:
  push:
    branches: [ master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Setup Node.js for React frontend build
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      # Build React frontend with environment variables
      - name: Build React Frontend
        env:
          VITE_N8N_WEBHOOK_URL: ${{ secrets.PROD_N8N_WEBHOOK_URL }}
          VITE_GEMINI_API_KEY: ${{ secrets.PROD_GEMINI_API_KEY }}
          VITE_MAPBOX_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          VITE_API_URL: ""
        run: |
          cd frontend
          npm ci
          npm audit --audit-level=high
          npm run build

      # Copy React build to Spring Boot static resources
      - name: Copy Frontend to Spring Boot
        run: |
          echo "📦 Cleaning static directory..."
          rm -rf src/main/resources/static/*
          mkdir -p src/main/resources/static
          cp -r frontend/dist/* src/main/resources/static/

          echo "✅ Verifying build artifacts..."
          ls -la src/main/resources/static/index.html || { echo "❌ index.html missing!"; exit 1; }
          
          BUNDLE=$(grep -o "index-[^.]*\.js" src/main/resources/static/index.html | head -1)
          echo "📦 Bundle: $BUNDLE"
          ls -la "src/main/resources/static/assets/$BUNDLE" || { echo "❌ Bundle missing!"; exit 1; }

      # Setup Java and build Spring Boot
      - uses: actions/setup-java@v4
        with: 
          distribution: temurin
          java-version: '17'
          cache: maven

      # Build Spring Boot JAR
      - name: Build Spring Boot JAR
        run: |
          echo "🔨 Building Production JAR..."
          mvn clean package -DskipTests

          echo "✅ Verifying static assets in JAR..."
          jar tf target/*.jar | grep "BOOT-INF/classes/static/index.html" || { echo "❌ index.html not in JAR!"; exit 1; }

          echo "✅ Verifying application.properties in JAR..."
          jar tf target/*.jar | grep "BOOT-INF/classes/application.properties" || { echo "❌ application.properties not in JAR!"; exit 1; }

          echo "✅ Verifying application-prod.properties in JAR..."
          jar tf target/*.jar | grep "BOOT-INF/classes/application-prod.properties" || { echo "❌ application-prod.properties not in JAR!"; exit 1; }

          echo "✅ Verifying application-prod.properties has content..."
          PROD_PROPS=$(jar xf target/*.jar BOOT-INF/classes/application-prod.properties && cat BOOT-INF/classes/application-prod.properties && rm -rf BOOT-INF)
          if [ $(echo "$PROD_PROPS" | wc -l) -lt 10 ]; then
            echo "❌ application-prod.properties appears to be empty or corrupted!"
            echo "Content: $PROD_PROPS"
            exit 1
          fi
          echo "   File has $(echo "$PROD_PROPS" | wc -l) lines ✓"

          echo "✅ All required files verified in JAR"

      # Build and push Docker image with production tag
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          echo "📦 Listing JARs in target directory..."
          ls -lh target/*.jar

          echo "🔨 Building Docker image..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/trip-calculate:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/trip-calculate:prod-${{ github.sha }} .

          echo "🔍 Verifying properties files in built Docker image BEFORE pushing..."
          CONTAINER_ID=$(docker create ${{ secrets.DOCKER_USERNAME }}/trip-calculate:latest)
          docker cp $CONTAINER_ID:/app/trip-calculate.jar /tmp/verify-docker.jar
          docker rm $CONTAINER_ID

          jar tf /tmp/verify-docker.jar | grep "BOOT-INF/classes/application.properties" || { echo "❌ application.properties missing from Docker image!"; exit 1; }
          jar tf /tmp/verify-docker.jar | grep "BOOT-INF/classes/application-prod.properties" || { echo "❌ application-prod.properties missing from Docker image!"; exit 1; }
          echo "✅ Properties files verified in Docker image"
          rm /tmp/verify-docker.jar

          docker push ${{ secrets.DOCKER_USERNAME }}/trip-calculate:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/trip-calculate:prod-${{ github.sha }}

      - name: Build and Push Agent Docker Image
        run: |
          echo "🤖 Building langgraph-agent Docker image..."
          docker build -t ${{ secrets.DOCKER_USERNAME }}/tripcalc-agent:latest \
                       -t ${{ secrets.DOCKER_USERNAME }}/tripcalc-agent:prod-${{ github.sha }} ./agent

          docker push ${{ secrets.DOCKER_USERNAME }}/tripcalc-agent:latest
          docker push ${{ secrets.DOCKER_USERNAME }}/tripcalc-agent:prod-${{ github.sha }}

  deploy:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/vps_deploy_key
          chmod 600 ~/.ssh/vps_deploy_key
          
          if [ -n "${{ secrets.VPS_KNOWN_HOSTS }}" ]; then
            echo "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
          else
            ssh-keyscan -H ${{ secrets.VPS_HOST }} >> ~/.ssh/known_hosts 2>/dev/null
          fi

      - name: Deploy to VPS
        env:
          DOCKER_USERNAME: ${{ secrets.DOCKER_USERNAME }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          VPS_USER: ${{ secrets.VPS_USER }}
          DATABASE_URL: ${{ secrets.PROD_DATABASE_URL }}
          DATABASE_USERNAME: ${{ secrets.PROD_DATABASE_USERNAME }}
          DATABASE_PASSWORD: ${{ secrets.PROD_DATABASE_PASSWORD }}
          GOOGLE_CLIENT_ID: ${{ secrets.PROD_GOOGLE_CLIENT_ID }}
          GOOGLE_CLIENT_SECRET: ${{ secrets.PROD_GOOGLE_CLIENT_SECRET }}
          OAUTH_REDIRECT_URI: ${{ secrets.PROD_OAUTH_REDIRECT_URI }}
          GMAIL_USERNAME: ${{ secrets.GMAIL_USERNAME }}
          GMAIL_APP_PASSWORD: ${{ secrets.GMAIL_APP_PASSWORD }}
          ADMIN_EMAIL: ${{ secrets.ADMIN_EMAIL }}
          MAPBOX_ACCESS_TOKEN: ${{ secrets.MAPBOX_ACCESS_TOKEN }}
          REDIS_PASSWORD: ${{ secrets.PROD_REDIS_PASSWORD }}
          N8N_WEBHOOK_URL: ${{ secrets.PROD_N8N_WEBHOOK_URL }}
          N8N_EXTRACTOR_URL: ${{ secrets.N8N_EXTRACTOR_URL }}
          SUPABASE_URL: ${{ secrets.PROD_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.PROD_SUPABASE_SERVICE_ROLE_KEY }}
          INTERNAL_JWT_SECRET: ${{ secrets.PROD_INTERNAL_JWT_SECRET }}
          AGENT_SERVICE_URL: http://langgraph-agent:8000
          # langgraph-agent container env vars
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY:       ${{ secrets.PROD_GEMINI_API_KEY }}
          OPENROUTER_API_KEY:   ${{ secrets.PROD_OPENROUTER_API_KEY }}
          OTM_KEY:              ${{ secrets.PROD_OTM_KEY }}
          LANGFUSE_PUBLIC_KEY:  ${{ secrets.PROD_LANGFUSE_PUBLIC_KEY }}
          LANGFUSE_SECRET_KEY:  ${{ secrets.PROD_LANGFUSE_SECRET_KEY }}
          LANGFUSE_HOST:        ${{ secrets.PROD_LANGFUSE_HOST }}
          OTEL_EXPORTER_OTLP_ENDPOINT: ${{ secrets.PROD_OTEL_EXPORTER_OTLP_ENDPOINT }}
        run: |
          ssh -i ~/.ssh/vps_deploy_key $VPS_USER@$VPS_HOST \
            "DOCKER_USERNAME='${DOCKER_USERNAME}' \
             DATABASE_URL='${DATABASE_URL}' \
             DATABASE_USERNAME='${DATABASE_USERNAME}' \
             DATABASE_PASSWORD='${DATABASE_PASSWORD}' \
             GOOGLE_CLIENT_ID='${GOOGLE_CLIENT_ID}' \
             GOOGLE_CLIENT_SECRET='${GOOGLE_CLIENT_SECRET}' \
             OAUTH_REDIRECT_URI='${OAUTH_REDIRECT_URI}' \
             GMAIL_USERNAME='${GMAIL_USERNAME}' \
             GMAIL_APP_PASSWORD='${GMAIL_APP_PASSWORD}' \
             ADMIN_EMAIL='${ADMIN_EMAIL}' \
             MAPBOX_ACCESS_TOKEN='${MAPBOX_ACCESS_TOKEN}' \
             REDIS_PASSWORD='${REDIS_PASSWORD}' \
             N8N_WEBHOOK_URL='${N8N_WEBHOOK_URL}' \
             N8N_EXTRACTOR_URL='${N8N_EXTRACTOR_URL}' \
             SUPABASE_URL='${SUPABASE_URL}' \
             SUPABASE_SERVICE_ROLE_KEY='${SUPABASE_SERVICE_ROLE_KEY}' \
             INTERNAL_JWT_SECRET='${INTERNAL_JWT_SECRET}' \
             AGENT_SERVICE_URL='${AGENT_SERVICE_URL}' \
             ANTHROPIC_API_KEY='${ANTHROPIC_API_KEY}' \
             GEMINI_API_KEY='${GEMINI_API_KEY}' \
             OPENROUTER_API_KEY='${OPENROUTER_API_KEY}' \
             OTM_KEY='${OTM_KEY}' \
             LANGFUSE_PUBLIC_KEY='${LANGFUSE_PUBLIC_KEY}' \
             LANGFUSE_SECRET_KEY='${LANGFUSE_SECRET_KEY}' \
             LANGFUSE_HOST='${LANGFUSE_HOST}' \
             OTEL_EXPORTER_OTLP_ENDPOINT='${OTEL_EXPORTER_OTLP_ENDPOINT}' \
             bash -s" <<'REMOTE'
            echo "🚀 Deploying to Production VPS..."

            # Create private Docker network if it doesn't exist
            docker network inspect trip-calculate-network >/dev/null 2>&1 || docker network create trip-calculate-network

            # Connect database to network if not already connected
            docker network connect trip-calculate-network trip-calculate-db 2>/dev/null || echo "✅ Database already on network"

            # ==================== SECURITY CHECKS ====================
            echo "🔒 Running security verification..."
            
            # Check database port exposure
            if docker port trip-calculate-db 2>/dev/null | grep -q "5432"; then
              echo "⚠️ WARNING: Database port 5432 is EXPOSED to internet!"
              echo "❌ Failing deployment for security reasons"
              exit 1
            else
              echo "✅ Database security verified - port 5432 NOT exposed"
            fi

            # ==================== REDIS SETUP ====================
            echo ""
            echo "🔴 Setting up Redis cache..."
            
            # Check if Redis container exists
            if docker ps -a --format '{{.Names}}' | grep -q "^trip-calculate-redis$"; then
              echo "✅ Redis container exists"
              
              # Check if running
              if ! docker ps --format '{{.Names}}' | grep -q "^trip-calculate-redis$"; then
                echo "⚠️ Redis container stopped, starting..."
                docker start trip-calculate-redis
              else
                echo "✅ Redis already running"
              fi
            else
              echo "📦 Creating new Redis container..."
              docker run -d \
                --name trip-calculate-redis \
                --network trip-calculate-network \
                --restart unless-stopped \
                -v trip-calculate-redis-data:/data \
                redis:7-alpine redis-server --requirepass "${REDIS_PASSWORD}"
              
              echo "✅ Redis container created"
            fi

            # Wait for Redis to be ready
            echo "⏳ Waiting for Redis to be ready..."
            sleep 3

            # Verify Redis health
            echo "🔍 Verifying Redis connectivity..."
            if docker exec trip-calculate-redis redis-cli -a "${REDIS_PASSWORD}" ping 2>/dev/null | grep -q "PONG"; then
              echo "✅ Redis health check passed"
            else
              echo "❌ Redis health check failed"
              echo "📋 Redis logs:"
              docker logs trip-calculate-redis --tail 20
              exit 1
            fi

            # Check Redis port exposure (security)
            if docker port trip-calculate-redis 2>/dev/null | grep -q "6379"; then
              echo "⚠️ WARNING: Redis port 6379 is EXPOSED to internet!"
              echo "🔒 Security Risk: Redis should NOT expose port 6379"
              exit 1
            else
              echo "✅ Redis security verified - port 6379 NOT exposed"
            fi

            # ==================== APPLICATION DEPLOYMENT ====================
            echo ""
            echo "📦 Deploying application..."
            
            # Pull latest image
            docker pull "${DOCKER_USERNAME}/trip-calculate:latest"

            # Stop and remove old container
            docker stop trip-calculate-prod || true
            docker rm trip-calculate-prod || true

            # Run new container with Redis connection
            docker run -d -p 8080:8080 \
              --name trip-calculate-prod \
              --restart unless-stopped \
              --network trip-calculate-network \
              -e SPRING_PROFILES_ACTIVE=prod \
              -e DATABASE_URL="${DATABASE_URL}" \
              -e DATABASE_USERNAME="${DATABASE_USERNAME}" \
              -e DATABASE_PASSWORD="${DATABASE_PASSWORD}" \
              -e GOOGLE_CLIENT_ID="${GOOGLE_CLIENT_ID}" \
              -e GOOGLE_CLIENT_SECRET="${GOOGLE_CLIENT_SECRET}" \
              -e OAUTH_REDIRECT_URI="${OAUTH_REDIRECT_URI}" \
              -e GMAIL_USERNAME="${GMAIL_USERNAME}" \
              -e GMAIL_APP_PASSWORD="${GMAIL_APP_PASSWORD}" \
              -e ADMIN_EMAIL="${ADMIN_EMAIL}" \
              -e MAPBOX_ACCESS_TOKEN="${MAPBOX_ACCESS_TOKEN}" \
              -e REDIS_HOST=trip-calculate-redis \
              -e REDIS_PORT=6379 \
              -e REDIS_PASSWORD="${REDIS_PASSWORD}" \
              -e AI_CACHE_TTL_HOURS=24 \
              -e N8N_WEBHOOK_URL="${N8N_WEBHOOK_URL}" \
              -e N8N_EXTRACTOR_URL="${N8N_EXTRACTOR_URL}" \
              -e SUPABASE_URL="${SUPABASE_URL}" \
              -e SUPABASE_SERVICE_ROLE_KEY="${SUPABASE_SERVICE_ROLE_KEY}" \
              -e INTERNAL_JWT_SECRET="${INTERNAL_JWT_SECRET}" \
              -e AGENT_SERVICE_URL="${AGENT_SERVICE_URL}" \
              "${DOCKER_USERNAME}/trip-calculate:latest"

            echo "✅ Application container started"
            docker ps -a | grep trip-calculate

            # ==================== CONNECTIVITY VERIFICATION ====================
            echo ""
            echo "🔍 Verifying inter-container connectivity..."
            sleep 5
            
            # Check database connectivity
            if docker exec trip-calculate-prod ping -c 2 trip-calculate-db >/dev/null 2>&1; then
              echo "✅ Database connectivity verified"
            else
              echo "❌ Cannot reach database from application"
              exit 1
            fi

            # Check Redis connectivity
            if docker exec trip-calculate-prod ping -c 2 trip-calculate-redis >/dev/null 2>&1; then
              echo "✅ Redis connectivity verified"
            else
              echo "❌ Cannot reach Redis from application"
              exit 1
            fi

            # ==================== HEALTH CHECK ====================
            echo ""
            echo "⏳ Waiting for application to start..."
            echo "📊 Monitoring startup progress..."

            RETRY_COUNT=0
            MAX_RETRIES=15  # Increased for Redis initialization
            RETRY_INTERVAL=5

            while [ $RETRY_COUNT -lt $MAX_RETRIES ]; do
              sleep $RETRY_INTERVAL
              RETRY_COUNT=$((RETRY_COUNT + 1))

              echo "⏳ Attempt $RETRY_COUNT/$MAX_RETRIES - checking health endpoint..."

              if curl -f http://localhost:8080/actuator/health >/dev/null 2>&1; then
                echo "✅ Application health check passed on attempt $RETRY_COUNT"
                curl -s http://localhost:8080/actuator/health | grep -o '"status":"[^"]*"'
                break
              fi

              if [ $RETRY_COUNT -eq $MAX_RETRIES ]; then
                echo "❌ Health check failed after $MAX_RETRIES attempts!"
                echo ""
                echo "📋 Application logs:"
                docker logs trip-calculate-prod --tail 50
                echo ""
                echo "🔴 Redis logs:"
                docker logs trip-calculate-redis --tail 20
                echo ""
                exit 1
              fi
            done

            # Check for connection errors in logs
            echo ""
            echo "🔍 Checking for connection issues..."
            
            if docker logs trip-calculate-prod --tail 50 | grep -qi "connection.*refused\|unable to.*database\|authentication.*failed"; then
              echo "⚠️ Warning: Potential database connection issues"
              docker logs trip-calculate-prod --tail 50 | grep -i "database\|postgresql\|hikari"
            fi

            if docker logs trip-calculate-prod --tail 50 | grep -qi "redis.*connection.*refused\|unable to.*redis"; then
              echo "⚠️ Warning: Potential Redis connection issues"
              docker logs trip-calculate-prod --tail 50 | grep -i "redis"
            fi

            # ==================== LANGGRAPH AGENT DEPLOYMENT ====================
            echo ""
            echo "🤖 Deploying langgraph-agent..."

            # Ensure the langgraph database exists on the shared Postgres
            echo "🗄️ Ensuring langgraph database exists..."
            docker exec trip-calculate-db psql -U tripplanner -c \
              "SELECT 'CREATE DATABASE langgraph OWNER tripplanner' WHERE NOT EXISTS (SELECT FROM pg_database WHERE datname = 'langgraph')\gexec" \
              || echo "⚠️ Could not run langgraph DB check — may already exist"

            docker pull "${DOCKER_USERNAME}/tripcalc-agent:latest"

            docker stop langgraph-agent || true
            docker rm   langgraph-agent || true

            docker run -d \
              --name langgraph-agent \
              --restart unless-stopped \
              --network trip-calculate-network \
              -e PG_URL="postgresql://${DATABASE_USERNAME}:${DATABASE_PASSWORD}@trip-calculate-db:5432/langgraph" \
              -e INTERNAL_JWT_SECRET="${INTERNAL_JWT_SECRET}" \
              -e ANTHROPIC_API_KEY="${ANTHROPIC_API_KEY}" \
              -e GEMINI_API_KEY="${GEMINI_API_KEY}" \
              -e OPENROUTER_API_KEY="${OPENROUTER_API_KEY}" \
              -e MAPBOX_TOKEN="${MAPBOX_ACCESS_TOKEN}" \
              -e OTM_KEY="${OTM_KEY}" \
              -e REDIS_URL="redis://:${REDIS_PASSWORD}@trip-calculate-redis:6379/0" \
              -e LANGFUSE_PUBLIC_KEY="${LANGFUSE_PUBLIC_KEY}" \
              -e LANGFUSE_SECRET_KEY="${LANGFUSE_SECRET_KEY}" \
              -e LANGFUSE_HOST="${LANGFUSE_HOST}" \
              -e OTEL_EXPORTER_OTLP_ENDPOINT="${OTEL_EXPORTER_OTLP_ENDPOINT}" \
              "${DOCKER_USERNAME}/tripcalc-agent:latest"

            echo "✅ langgraph-agent container started"

            # Wait for the agent to be ready (startup is slower — downloads model metadata etc.)
            echo "⏳ Waiting for langgraph-agent to be ready..."
            AGENT_RETRIES=0
            MAX_AGENT_RETRIES=20
            until [ $AGENT_RETRIES -ge $MAX_AGENT_RETRIES ]; do
              sleep 5
              AGENT_RETRIES=$((AGENT_RETRIES + 1))
              STATUS=$(docker exec langgraph-agent python -c \
                "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')" \
                2>/dev/null && echo ok || echo fail)
              if [ "$STATUS" = "ok" ]; then
                echo "✅ langgraph-agent health check passed on attempt $AGENT_RETRIES"
                break
              fi
              echo "⏳ Attempt $AGENT_RETRIES/$MAX_AGENT_RETRIES — not ready yet..."
              if [ $AGENT_RETRIES -eq $MAX_AGENT_RETRIES ]; then
                echo "❌ langgraph-agent failed to become healthy!"
                docker logs langgraph-agent --tail 50
                exit 1
              fi
            done

            # Verify agent port is NOT exposed to host (security check)
            if docker port langgraph-agent 2>/dev/null | grep -q "8000"; then
              echo "❌ SECURITY: langgraph-agent port 8000 is exposed to host! Aborting."
              exit 1
            else
              echo "✅ Agent security verified — port 8000 NOT exposed to host"
            fi

            # ==================== DEPLOYMENT SUMMARY ====================
            echo ""
            echo "🎉 Deployment Summary:"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Application:     ✅ Running on port 8080"
            echo "LangGraph Agent: ✅ Running on internal network only"
            echo "Database:        ✅ Secured on private network"
            echo "Redis:           ✅ Secured on private network"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo "Security Checks:"
            echo "  DB Port:    $(docker port trip-calculate-db >/dev/null 2>&1 && echo '❌ EXPOSED!' || echo '✅ NOT exposed')"
            echo "  Redis Port: $(docker port trip-calculate-redis >/dev/null 2>&1 && echo '❌ EXPOSED!' || echo '✅ NOT exposed')"
            echo "  Agent Port: $(docker port langgraph-agent 2>/dev/null | grep -q 8000 && echo '❌ EXPOSED!' || echo '✅ NOT exposed')"
            echo "  Health:     $(curl -sf http://localhost:8080/actuator/health >/dev/null && echo '✅ Healthy' || echo '❌ Unhealthy')"
            echo "━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━"
            echo ""
            echo "✅ Production deployment complete!"
            echo ""
            echo "📦 Final container status:"
            docker ps --format "table {{.Names}}\t{{.Status}}\t{{.Ports}}"
          REMOTE

      - name: Cleanup SSH Key
        if: always()
        run: rm -f ~/.ssh/vps_deploy_key

      - name: Send Deployment Notification
        if: always()
        run: |
          echo "🎉 Production deployment completed for commit ${{ github.sha }}"