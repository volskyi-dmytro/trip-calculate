# Test-profile overrides — keeps the Spring context lightweight for unit and integration tests.
# Applied when @ActiveProfiles("test") is set on a test class.

# AI access layer — placeholder values so beans initialise without real credentials
ai.access.supabase-url=https://test.supabase.co
ai.access.supabase-service-role-key=test-service-role-key-placeholder
ai.access.internal-jwt-secret=test-internal-jwt-secret-placeholder-min-32-chars!!

# Redis — point at a non-existent server; tests that use Redis must mock the template
spring.data.redis.host=localhost
spring.data.redis.port=6380
# Disable Redis health check so the context still loads without a live Redis instance
spring.data.redis.connect-timeout=1ms

# Suppress Redis auto-reconnect noise in test logs
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration

# N8N webhook (not used in tests, but avoids @Value binding failures)
n8n.webhook.url=http://test-n8n:5678/webhook/test
n8n.extractor.url=http://test-n8n:5678/webhook/extract

# Mail — disable for tests
spring.mail.host=localhost
spring.mail.port=25
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisRepositoriesAutoConfiguration
