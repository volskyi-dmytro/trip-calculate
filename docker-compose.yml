# TripCalculate — Docker Compose
#
# Base services (no profile flag needed):
#   postgres, app, langgraph-agent
#
# Observability services (opt-in via --profile observability):
#   redis, clickhouse, minio, langfuse-web, langfuse-worker,
#   otel-collector, prometheus, grafana
#
# Usage:
#   docker compose up -d                          # base stack only
#   docker compose --profile observability up -d  # full stack with observability
#
# IMPORTANT: langgraph-agent port 8000 is NOT published to the host.
# It is reachable only from Spring Boot over the internal `agent-net` network.
# This enforces the architecture diagram in CLAUDE.md §Architecture.

services:

  # --------------------------------------------------------------------------
  # PostgreSQL — shared by Spring Boot (tripplanner DB) and the agent (langgraph DB).
  # In production a managed Postgres is used; this service is for local dev only.
  # --------------------------------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg15
    restart: unless-stopped
    environment:
      POSTGRES_USER: tripplanner
      POSTGRES_PASSWORD: ${DATABASE_PASSWORD}
      # Both databases are created by init scripts below.
      POSTGRES_DB: tripplanner
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/db-init:/docker-entrypoint-initdb.d:ro
    networks:
      - agent-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tripplanner"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # Spring Boot application — serves the React SPA and relays SSE to the agent.
  # --------------------------------------------------------------------------
  app:
    build:
      context: .
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - .env
    environment:
      # Override DATABASE_URL to point to the compose postgres service.
      DATABASE_URL: jdbc:postgresql://postgres:5432/tripplanner
      # URL for the agent service — internal only, never the published host port.
      AGENT_SERVICE_URL: http://langgraph-agent:8000
    ports:
      - "8080:8080"
    networks:
      - agent-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------------------------
  # LangGraph agent — FastAPI + LangGraph microservice.
  #
  # Port 8000 is exposed on the compose network ONLY (expose:, not ports:).
  # CLAUDE.md §Non-negotiable: the agent is internal-only; Spring Boot is the
  # only ingress for external traffic.
  # --------------------------------------------------------------------------
  langgraph-agent:
    build:
      context: ./agent
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file:
      - ./agent/.env
    environment:
      # Override PG_URL to point to the compose postgres service.
      PG_URL: postgresql://tripplanner:${DATABASE_PASSWORD}@postgres:5432/langgraph
    expose:
      - "8000"
    networks:
      - agent-net
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')\" || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

  # --------------------------------------------------------------------------
  # Redis — required by Langfuse v3 for job queues and pub/sub.
  # Also used by the agent stack for grant caching and usage counters (M5).
  # Profile: observability (base stack connects to Redis via env vars only
  # if the REDIS_URL env var is set; otherwise Spring Boot uses in-memory).
  # --------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      sh -c "if [ -n \"$$REDIS_AUTH\" ]; then
               redis-server --requirepass \"$$REDIS_AUTH\";
             else
               redis-server;
             fi"
    environment:
      REDIS_AUTH: ${REDIS_AUTH:-}
    expose:
      - "6379"
    networks:
      - agent-net
    profiles:
      - observability
    healthcheck:
      test: >
        sh -c "if [ -n \"$$REDIS_AUTH\" ]; then
                 redis-cli -a \"$$REDIS_AUTH\" ping;
               else
                 redis-cli ping;
               fi"
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    volumes:
      - redis_data:/data

  # --------------------------------------------------------------------------
  # ClickHouse — required by Langfuse v3 for high-volume trace event analytics.
  # Langfuse-worker ingests OTEL spans into ClickHouse; Langfuse-web reads
  # aggregated stats from it for the UI cost/usage dashboards.
  # --------------------------------------------------------------------------
  clickhouse:
    image: clickhouse/clickhouse-server:24.3-alpine
    restart: unless-stopped
    environment:
      CLICKHOUSE_DB: ${CLICKHOUSE_DB:-langfuse}
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-langfuse_ch_pass}
    expose:
      - "8123"   # HTTP interface (used by Langfuse)
      - "9000"   # native TCP interface
    networks:
      - agent-net
    profiles:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8123/ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    volumes:
      - clickhouse_data:/var/lib/clickhouse

  # --------------------------------------------------------------------------
  # MinIO — S3-compatible blob store for Langfuse v3 event uploads.
  # Langfuse v3 requires object storage for trace payloads > a certain size.
  # In production, replace with a real S3 bucket or managed object store.
  # --------------------------------------------------------------------------
  minio:
    image: minio/minio:RELEASE.2024-11-07T00-52-20Z
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
    expose:
      - "9000"   # S3 API endpoint
      - "9001"   # MinIO web console (not published to host)
    networks:
      - agent-net
    profiles:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "mc ready local || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    volumes:
      - minio_data:/data

  # --------------------------------------------------------------------------
  # MinIO bucket init — one-shot container that creates the Langfuse bucket.
  # Runs after MinIO is healthy; restarts=no so it doesn't loop.
  # --------------------------------------------------------------------------
  minio-init:
    image: minio/mc:RELEASE.2024-11-17T19-35-25Z
    restart: "no"
    networks:
      - agent-net
    profiles:
      - observability
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      sh -c "
        mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin_pass} &&
        mc mb --ignore-existing local/$${LANGFUSE_S3_BUCKET:-langfuse-events} &&
        echo 'Bucket ready.'
      "
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-minioadmin}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      LANGFUSE_S3_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse-events}

  # --------------------------------------------------------------------------
  # Langfuse Web (v3) — Next.js UI + API gateway.
  # Exposed on host port 3001 (port 3000 is occupied by the React dev server).
  # First-time setup: open http://localhost:3001, create an admin user,
  # create a project named "tripcalc-agent", copy the keys to .env.
  # --------------------------------------------------------------------------
  langfuse-web:
    image: langfuse/langfuse:3
    restart: unless-stopped
    environment:
      # Postgres — uses the same postgres service, separate `langfuse` database.
      DATABASE_URL: postgresql://tripplanner:${DATABASE_PASSWORD}@postgres:5432/langfuse

      # Redis
      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_AUTH:-}

      # ClickHouse
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-langfuse_ch_pass}
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      # MinIO / S3-compatible blob store
      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse-events}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      # Auth + encryption — generate with: openssl rand -hex 32
      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}
      NEXTAUTH_URL: ${LANGFUSE_NEXTAUTH_URL:-http://localhost:3001}

      # Telemetry — disable phone-home in local dev
      TELEMETRY_ENABLED: "false"

      # OTEL self-instrumentation of Langfuse (optional; leave off for M4)
      # OTEL_EXPORTER_OTLP_ENDPOINT: http://otel-collector:4317
    ports:
      - "3001:3000"
    networks:
      - agent-net
    profiles:
      - observability
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      minio-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/public/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # --------------------------------------------------------------------------
  # Langfuse Worker (v3) — background job processor.
  # Consumes events from Redis queues, writes to ClickHouse + Postgres.
  # No published ports — purely internal.
  # --------------------------------------------------------------------------
  langfuse-worker:
    image: langfuse/langfuse-worker:3
    restart: unless-stopped
    environment:
      # Must mirror langfuse-web exactly — they share the same config.
      DATABASE_URL: postgresql://tripplanner:${DATABASE_PASSWORD}@postgres:5432/langfuse

      REDIS_HOST: redis
      REDIS_PORT: "6379"
      REDIS_AUTH: ${REDIS_AUTH:-}

      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_USER: ${CLICKHOUSE_USER:-langfuse}
      CLICKHOUSE_PASSWORD: ${CLICKHOUSE_PASSWORD:-langfuse_ch_pass}
      CLICKHOUSE_CLUSTER_ENABLED: "false"

      LANGFUSE_S3_EVENT_UPLOAD_ENABLED: "true"
      LANGFUSE_S3_EVENT_UPLOAD_BUCKET: ${LANGFUSE_S3_BUCKET:-langfuse-events}
      LANGFUSE_S3_EVENT_UPLOAD_REGION: ${LANGFUSE_S3_REGION:-us-east-1}
      LANGFUSE_S3_EVENT_UPLOAD_ACCESS_KEY_ID: ${MINIO_ROOT_USER:-minioadmin}
      LANGFUSE_S3_EVENT_UPLOAD_SECRET_ACCESS_KEY: ${MINIO_ROOT_PASSWORD:-minioadmin_pass}
      LANGFUSE_S3_EVENT_UPLOAD_ENDPOINT: http://minio:9000
      LANGFUSE_S3_EVENT_UPLOAD_FORCE_PATH_STYLE: "true"

      NEXTAUTH_SECRET: ${LANGFUSE_NEXTAUTH_SECRET}
      SALT: ${LANGFUSE_SALT}
      ENCRYPTION_KEY: ${LANGFUSE_ENCRYPTION_KEY}

      TELEMETRY_ENABLED: "false"
    networks:
      - agent-net
    profiles:
      - observability
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
      langfuse-web:
        condition: service_healthy

  # --------------------------------------------------------------------------
  # OpenTelemetry Collector — receives OTLP from Spring Boot + Python agent,
  # fans out to Langfuse (traces) and Prometheus (metrics).
  #
  # LANGFUSE_OTEL_AUTH must be set in .env as:
  #   LANGFUSE_OTEL_AUTH=Basic <base64(LANGFUSE_PUBLIC_KEY:LANGFUSE_SECRET_KEY)>
  # Generate with:
  #   echo -n "pk-lf-...:sk-lf-..." | base64
  # --------------------------------------------------------------------------
  otel-collector:
    image: otel/opentelemetry-collector-contrib:0.114.0
    restart: unless-stopped
    command: ["--config=/etc/otel-collector-config.yaml"]
    environment:
      LANGFUSE_OTEL_AUTH: ${LANGFUSE_OTEL_AUTH}
    volumes:
      - ./observability/otel-collector/config.yaml:/etc/otel-collector-config.yaml:ro
    expose:
      - "4317"   # OTLP gRPC (services push spans/metrics here)
      - "4318"   # OTLP HTTP
      - "8888"   # Collector internal metrics
      - "8889"   # Prometheus scrape endpoint (metrics from OTLP)
      - "13133"  # Health check extension
    networks:
      - agent-net
    profiles:
      - observability
    depends_on:
      langfuse-web:
        condition: service_healthy
      prometheus:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:13133/ || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # Prometheus — metrics store.
  # Scrapes the OTEL collector's prometheus exporter on :8889.
  # Also receives remote-write pushes from the collector on /api/v1/write.
  # In production, replace with a managed Prometheus (Grafana Cloud, etc.)
  # and update the otel-collector config's prometheusremotewrite endpoint.
  # --------------------------------------------------------------------------
  prometheus:
    image: prom/prometheus:v2.55.0
    restart: unless-stopped
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--storage.tsdb.retention.time=15d"
      - "--web.enable-remote-write-receiver"  # accepts pushes from otel-collector
      - "--web.console.libraries=/usr/share/prometheus/console_libraries"
      - "--web.console.templates=/usr/share/prometheus/consoles"
    volumes:
      - ./monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    expose:
      - "9090"
    networks:
      - agent-net
    profiles:
      - observability
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  # --------------------------------------------------------------------------
  # Grafana — dashboards + alerting.
  # Exposed on host port 3002.
  # Login: admin / ${GRAFANA_ADMIN_PASSWORD} (set in .env).
  # Dashboards and datasources are provisioned from monitoring/grafana/.
  # --------------------------------------------------------------------------
  grafana:
    image: grafana/grafana:11.3.0
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      GF_SECURITY_DISABLE_GRAVATAR: "true"
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      # Provisioning paths (mapped via volume below).
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
    volumes:
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/etc/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    ports:
      - "3002:3000"
    networks:
      - agent-net
    profiles:
      - observability
    depends_on:
      prometheus:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

networks:
  agent-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
  minio_data:
  prometheus_data:
  grafana_data:
